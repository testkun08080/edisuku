name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts-lint-test:
    name: pnpm lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 9.12.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome check apps/api packages/db packages/types packages/metrics apps/web/lib e2e
      - run: pnpm turbo typecheck --concurrency=4
      - run: pnpm turbo test --concurrency=4
      - name: Backfill script dry-run (LIMIT=1)
        run: |
          sqlite3 /tmp/ci-corpus.db < packages/db/migrations/0000_init.sql
          sqlite3 /tmp/ci-corpus.db < packages/db/migrations/0001_company_metrics.sql
          sqlite3 /tmp/ci-corpus.db < packages/db/migrations/0002_drop_legacy_tables.sql
          sqlite3 /tmp/ci-corpus.db < infra/init/seed-local-d1.sql
          sqlite3 /tmp/ci-corpus.db < infra/init/ci-companies-only-fixture.sql
          LIMIT=1 pnpm --filter @edinet/metrics exec tsx ../../infra/init/build-company-metrics.mjs \
            /tmp/ci-corpus.db /tmp/ci-company_metrics.sql --limit 1
          grep -q "INSERT OR REPLACE INTO company_metrics" /tmp/ci-company_metrics.sql
          pnpm --filter @edinet/metrics exec tsx ../../infra/init/build-company-metrics.mjs \
            /tmp/ci-corpus.db /tmp/ci-companies-only-metrics.sql
          grep -q "'0098'" /tmp/ci-companies-only-metrics.sql

  py-lint-test:
    name: uv ruff + pytest (apps/wrapper)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/wrapper
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v3
        with:
          version: latest
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 9.12.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
        working-directory: e2e
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7
      - name: Comment E2E failure on PR
        if: failure() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const { execSync } = require('node:child_process');
            const marker = '<!-- e2e-failure -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body;
            try {
              body = execSync(
                `node e2e/scripts/format-pr-comment.mjs e2e/test-results.json ${runUrl}`,
                { encoding: 'utf8' },
              );
            } catch {
              body = `${marker}\n## E2E テスト失敗\n\nWorkflow run: ${runUrl}\n\nArtifacts タブの playwright-report を確認してください。`;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

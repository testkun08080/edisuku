name: daily-refresh

on:
  # schedule:
  #   - cron: "10 20 * * *" # 05:10 JST
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        default: staging
        options: [staging, production]
      target_date:
        description: "Target submission date (YYYY-MM-DD), default = yesterday (JST)"
        required: false

concurrency:
  group: daily-refresh-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TARGET_ENV: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v3
        with: { version: latest }

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: uv sync
        working-directory: apps/wrapper
        run: uv sync --frozen

      - name: Render API wrangler config
        env:
          STAGING_D1_ID: ${{ secrets.D1_STAGING_ID }}
          PROD_D1_ID: ${{ secrets.D1_PRODUCTION_ID }}
          STAGING_KV_ID: ${{ secrets.KV_STAGING_ID }}
          PROD_KV_ID: ${{ secrets.KV_PRODUCTION_ID }}
          STAGING_WEB_URL: ${{ secrets.STAGING_WEB_URL }}
          PROD_WEB_URL: ${{ secrets.PROD_WEB_URL }}
        run: bash infra/render-wrangler-config.sh --target api --env "$TARGET_ENV"

      - name: Resolve D1 database name
        run: |
          if [ "$TARGET_ENV" = "staging" ]; then
            D1_NAME="${{ secrets.D1_STAGING_NAME }}"
            D1_NAME="${D1_NAME:-edisuku-db-staging}"
          else
            D1_NAME="${{ secrets.D1_PRODUCTION_NAME }}"
            D1_NAME="${D1_NAME:-edisuku-db}"
          fi
          echo "D1_NAME=$D1_NAME" >> "$GITHUB_ENV"
          echo "Using D1 database: $D1_NAME ($TARGET_ENV)"

      - name: Resolve KV namespace id
        run: |
          if [ "$TARGET_ENV" = "staging" ]; then
            KV_NAMESPACE_ID="${{ secrets.KV_STAGING_ID }}"
          else
            KV_NAMESPACE_ID="${{ secrets.KV_PRODUCTION_ID }}"
          fi
          echo "KV_NAMESPACE_ID=$KV_NAMESPACE_ID" >> "$GITHUB_ENV"

      - name: Resolve target date
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            TARGET_DATE="${{ github.event.inputs.target_date }}"
          else
            TARGET_DATE=$(TZ=Asia/Tokyo date -d 'yesterday' +%F)
          fi
          echo "TARGET_DATE=$TARGET_DATE" >> "$GITHUB_ENV"
          echo "Using submission date: $TARGET_DATE (JST)"

      - name: Record pipeline run id and start time
        run: |
          echo "PIPELINE_RUN_ID=${{ github.run_id }}" >> "$GITHUB_ENV"
          echo "PIPELINE_STARTED_AT=$(date -u +%FT%T)" >> "$GITHUB_ENV"
          echo "PIPELINE_SCOPE=daily-refresh-$TARGET_ENV" >> "$GITHUB_ENV"

      - name: Fetch known doc_ids from D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx -y wrangler@4 d1 execute "$D1_NAME" --remote \
            --config apps/api/wrangler.toml \
            --env "$TARGET_ENV" \
            --command "SELECT doc_id FROM documents" --json \
            > /tmp/known.json

      - name: Ingest new documents
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        working-directory: apps/wrapper
        run: |
          mkdir -p data
          uv run python scripts/ingest_daily.py \
            --date "$TARGET_DATE" \
            --known-docs /tmp/known.json \
            --output data/edinet.db \
            --stats-out /tmp/ingest-stats.json

      - name: Emit delta SQL
        working-directory: apps/wrapper
        run: |
          ## 25h window: daily cron overlap + 1h slack for retries.
          ## INSERT OR REPLACE in publish_to_d1.py makes the small overlap idempotent.
          since=$(date -u -d "25 hours ago" +%FT%T)
          uv run python scripts/publish_to_d1.py \
            --source data/edinet.db \
            --since "$since" \
            --output /tmp/delta.sql

      - name: Apply delta to D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -s /tmp/delta.sql ]; then
            npx -y wrangler@4 d1 execute "$D1_NAME" --remote \
              --config apps/api/wrangler.toml \
              --env "$TARGET_ENV" \
              --file /tmp/delta.sql
          else
            echo "No delta to apply"
          fi

      - name: Export D1 corpus for metrics rebuild
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx -y wrangler@4 d1 export "$D1_NAME" --remote \
            --config apps/api/wrangler.toml \
            --env "$TARGET_ENV" \
            --output /tmp/corpus.sql
          sqlite3 /tmp/corpus.db < /tmp/corpus.sql

      - name: Rebuild company_metrics
        run: |
          pnpm --filter @edinet/metrics exec tsx ../../infra/init/build-company-metrics.mjs \
            /tmp/corpus.db /tmp/company_metrics.sql
          wc -l /tmp/company_metrics.sql

      - name: Apply company_metrics to D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -s /tmp/company_metrics.sql ]; then
            npx -y wrangler@4 d1 execute "$D1_NAME" --remote \
              --config apps/api/wrangler.toml \
              --env "$TARGET_ENV" \
              --file /tmp/company_metrics.sql
          else
            echo "No company_metrics SQL generated"
          fi

      - name: Backfill shareholder_snapshots from corpus
        run: |
          pnpm --filter @edinet/metrics exec tsx ../../infra/init/build-shareholder-from-corpus.mjs \
            /tmp/corpus.db /tmp/shareholder_backfill.sql
          wc -l /tmp/shareholder_backfill.sql || true

      - name: Apply shareholder_snapshots backfill to D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -s /tmp/shareholder_backfill.sql ] && grep -q "INSERT OR REPLACE INTO shareholder_snapshots" /tmp/shareholder_backfill.sql; then
            npx -y wrangler@4 d1 execute "$D1_NAME" --remote \
              --config apps/api/wrangler.toml \
              --env "$TARGET_ENV" \
              --file /tmp/shareholder_backfill.sql
          else
            echo "No shareholder_snapshots backfill SQL to apply (TSV paths may be missing on corpus export)"
          fi

      - name: Invalidate metrics KV snapshot
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$KV_NAMESPACE_ID" ]; then
            npx -y wrangler@4 kv key delete "screener:metrics:v2" \
              --namespace-id "$KV_NAMESPACE_ID" || true
            echo "Deleted KV key screener:metrics:v2 (rebuilt on next /api/metrics request)"
          else
            echo "KV_NAMESPACE_ID not set, skipping KV invalidation"
          fi

      - name: Record pipeline metadata
        if: success()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          FINISHED_AT=$(date -u +%FT%T)
          INGEST_FETCHED=$(jq -r '.fetched // 0' /tmp/ingest-stats.json 2>/dev/null || echo 0)
          INGEST_INGESTED=$(jq -r '.ingested // 0' /tmp/ingest-stats.json 2>/dev/null || echo 0)
          INGEST_SKIPPED=$(jq -r '.skipped // 0' /tmp/ingest-stats.json 2>/dev/null || echo 0)
          INGEST_ERRORS=$(jq -r '.errors // 0' /tmp/ingest-stats.json 2>/dev/null || echo 0)
          COMPANY_COUNT=$(sqlite3 /tmp/corpus.db "SELECT COUNT(*) FROM companies")
          DOCUMENT_COUNT=$(sqlite3 /tmp/corpus.db "SELECT COUNT(*) FROM documents")
          PERIOD_COUNT=$(sqlite3 /tmp/corpus.db "SELECT COUNT(*) FROM period_financials")
          (cd apps/wrapper && uv run python scripts/emit_pipeline_meta.py \
            --target-date "$TARGET_DATE" \
            --scope "$PIPELINE_SCOPE" \
            --run-id "$PIPELINE_RUN_ID" \
            --status success \
            --started-at "$PIPELINE_STARTED_AT" \
            --finished-at "$FINISHED_AT" \
            --fetched "$INGEST_FETCHED" \
            --ingested "$INGEST_INGESTED" \
            --skipped "$INGEST_SKIPPED" \
            --errors "$INGEST_ERRORS" \
            --company-count "$COMPANY_COUNT" \
            --document-count "$DOCUMENT_COUNT" \
            --period-financial-count "$PERIOD_COUNT" \
            --output /tmp/pipeline_meta.sql)
          npx -y wrangler@4 d1 execute "$D1_NAME" --remote \
            --config apps/api/wrangler.toml \
            --env "$TARGET_ENV" \
            --file /tmp/pipeline_meta.sql

      - name: Record failed pipeline run
        if: failure()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          FINISHED_AT=$(date -u +%FT%T)
          INGEST_FETCHED=$(jq -r '.fetched // 0' /tmp/ingest-stats.json 2>/dev/null || echo 0)
          INGEST_INGESTED=$(jq -r '.ingested // 0' /tmp/ingest-stats.json 2>/dev/null || echo 0)
          INGEST_SKIPPED=$(jq -r '.skipped // 0' /tmp/ingest-stats.json 2>/dev/null || echo 0)
          INGEST_ERRORS=$(jq -r '.errors // 0' /tmp/ingest-stats.json 2>/dev/null || echo 0)
          (cd apps/wrapper && uv run python scripts/emit_pipeline_meta.py \
            --target-date "$TARGET_DATE" \
            --scope "$PIPELINE_SCOPE" \
            --run-id "$PIPELINE_RUN_ID" \
            --status failed \
            --started-at "$PIPELINE_STARTED_AT" \
            --finished-at "$FINISHED_AT" \
            --fetched "$INGEST_FETCHED" \
            --ingested "$INGEST_INGESTED" \
            --skipped "$INGEST_SKIPPED" \
            --errors "$INGEST_ERRORS" \
            --notes "workflow failed" \
            --skip-daily-metrics \
            --output /tmp/pipeline_meta.sql)
          npx -y wrangler@4 d1 execute "$D1_NAME" --remote \
            --config apps/api/wrangler.toml \
            --env "$TARGET_ENV" \
            --file /tmp/pipeline_meta.sql

      # Optional — not enabled (requires R2 bucket setup; see docs/modules/infra.md)
